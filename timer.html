<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timer Application</title>
    <link rel="stylesheet" href="timer.css">
</head>
<body>

    <div class="container">
        <h1>Timer</h1>

        <div id="display">00:00:00</div>
        <div id="status">Status: Reset</div>

        <div class="buttons">
            <button id="startBtn">Start (S)</button>
            <button id="pauseBtn">Pause (P)</button>
            <button id="resetBtn">Reset (R)</button>
        </div>
    </div>

    <script src="timer.js"></script>
</body>
</html>
